<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leandro Links</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M4WDS19ZGE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    
    gtag('js', new Date());
    gtag('config', 'G-M4WDS19ZGE');
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1a1a2e 0%, #09090f 45%, #000 100%);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 15, 25, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #222, #555);
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .bio {
      color: #b8b8c8;
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: block;
      text-decoration: none;
      color: #fff;
      padding: 15px 18px;
      border-radius: 14px;
      background: #151520;
      border: 1px solid #2a2a3a;
      transition: 0.25s;
      font-weight: bold;
    }

    .link:hover {
      transform: translateY(-2px);
      background: #202034;
      border-color: #6c63ff;
      box-shadow: 0 0 18px rgba(108, 99, 255, 0.35);
    }

    .footer {
      margin-top: 26px;
      font-size: 11px;
      color: #777;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="avatar">L</div>

    <h1>Leandro</h1>

    <p class="bio">
      Desenvolvedor teste
    </p>

    <section class="links">
      <a class="link" href="https://instagram.com/" target="_blank">Instagram</a>
      <a class="link" href="https://github.com/" target="_blank">GitHub</a>
      <a class="link" href="https://linkedin.com/" target="_blank">LinkedIn</a>
      <a class="link" href="https://itch.io/" target="_blank">Itch.io</a>
      <a class="link" href="https://youtube.com/" target="_blank">YouTube</a>
    </section>

    <p class="footer">
      © 2026 Leandro • Este site utiliza analytics básico para medir visitas, país e dispositivo de forma agregada.
    </p>
  </main>
</body>
</html>
