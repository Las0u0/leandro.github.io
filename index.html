<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- impedir indexação -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, nofollow">

  <title>Leandro Links</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #1a1a2e 0%, #09090f 45%, #000 100%);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 15, 25, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #222, #555);
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .bio {
      color: #b8b8c8;
      font-size: 15px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: block;
      text-decoration: none;
      color: #fff;
      padding: 15px 18px;
      border-radius: 14px;
      background: #151520;
      border: 1px solid #2a2a3a;
      transition: 0.25s;
      font-weight: bold;
    }

    .link:hover {
      transform: translateY(-2px);
      background: #202034;
      border-color: #6c63ff;
      box-shadow: 0 0 18px rgba(108, 99, 255, 0.35);
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="avatar">L</div>

    <h1>Leandro</h1>

    <p class="bio">
      Links Redes
    </p>

    <section class="links">
      <a class="link" href="https://twitter.com/L34ndor" target="_blank">Twitter / X</a>

      <a class="link" href="https://github.com/Las0u0" target="_blank">GitHub</a>

      <a class="link" href="https://steamcommunity.com/id/b0n0r090" target="_blank">Steam</a>
    </section>
  </main>
</body>
</html>
